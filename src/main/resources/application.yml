server:
  port: ${NOTIFY_HTTP_PORT:8080}

spring:
  datasource:
    url: jdbc:sqlite:${NOTIFY_DB_PATH:./data/notify.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1

notify:
  db-path: ${NOTIFY_DB_PATH:./data/notify.db}
  http-port: ${NOTIFY_HTTP_PORT:8080}
  workers: ${NOTIFY_WORKERS:1}
  max-attempts: ${NOTIFY_MAX_ATTEMPTS:12}
  base-backoff: ${NOTIFY_BASE_BACKOFF_MS:500}ms
  max-backoff: ${NOTIFY_MAX_BACKOFF_MS:600000}ms
  http-timeout: ${NOTIFY_HTTP_TIMEOUT_MS:5000}ms
  poll-interval: ${NOTIFY_POLL_INTERVAL_MS:250}ms
  jitter-percent: ${NOTIFY_JITTER_PERCENT:0.2}
  delivering-stuck-after: ${NOTIFY_DELIVERING_STUCK_MS:30000}ms

